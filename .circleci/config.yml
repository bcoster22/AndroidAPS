# CircleCI configuration for bcoster22/AndroidAPS fork
# Uses CircleCI cloud runners (not nightscout's self-hosted runners)
version: 2.1

orbs:
  android: circleci/android@2.4.0
  codecov: codecov/codecov@3.3.0

jobs:
  build-and-test:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1

    steps:
      - checkout

      - android/change-java-version:
          java-version: 21

      # Compile sources first (also warms up Gradle daemon and caches)
      - run:
          name: Compile debug sources
          command: |
            ./gradlew \
              -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
              -Dkotlin.daemon.jvm.options="-Xmx2g" \
              -Dkotlin.compiler.execution.strategy="in-process" \
              -Dorg.gradle.daemon=true \
              -Dorg.gradle.caching=true \
              compileFullDebugUnitTestSources compileFullDebugAndroidTestSources
          no_output_timeout: 30m

      # Run unit tests (no emulator needed)
      - run:
          name: Run unit tests
          command: |
            ./gradlew \
              -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
              -Dkotlin.daemon.jvm.options="-Xmx2g" \
              -Dkotlin.compiler.execution.strategy="in-process" \
              -Dorg.gradle.daemon=true \
              -Dorg.gradle.caching=true \
              -Dorg.gradle.workers.max=8 \
              testFullDebugUnitTest
          no_output_timeout: 30m

      # Generate code coverage report
      - run:
          name: Generate Jacoco coverage report
          command: |
            ./gradlew --stacktrace jacocoAllDebugReport
          no_output_timeout: 15m

      # Save test results for CircleCI UI
      - run:
          name: Save test results
          command: |
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/build/test-results/.*xml" -exec cp {} ~/test-results/junit/ \;
            find . -type f -regex ".*/build/outputs/androidTest-results/.*xml" -exec cp {} ~/test-results/junit/ \;
          when: always

      - store_test_results:
          path: ~/test-results

      - store_artifacts:
          path: ~/test-results/junit

      - codecov/upload:
          file: './build/reports/jacoco/jacocoAllDebugReport/jacocoAllDebugReport.xml'

  # Lighter job: compile only (fast feedback on PRs)
  build-only:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1

    steps:
      - checkout

      - android/change-java-version:
          java-version: 21

      - run:
          name: Compile all variants
          command: |
            ./gradlew \
              -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
              -Dkotlin.daemon.jvm.options="-Xmx2g" \
              -Dkotlin.compiler.execution.strategy="in-process" \
              -Dorg.gradle.daemon=true \
              -Dorg.gradle.caching=true \
              compileFullDebugSources
          no_output_timeout: 30m

workflows:
  # Full test suite - runs on master/develop pushes
  full-tests:
    jobs:
      - build-and-test:
          filters:
            branches:
              only:
                - master
                - develop

  # Quick build check - runs on all other branches (PRs)
  pr-check:
    jobs:
      - build-only:
          filters:
            branches:
              ignore:
                - master
                - develop
