name: Fork CI - Build & Test

# Runs automatically on PRs and pushes to key branches
on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Fast compile check - runs on every PR
  build:
    name: Build (compile check)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile debug sources
        run: |
          ./gradlew compileFullDebugSources \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC -Xss1024m" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Dorg.gradle.daemon=true \
            -Dorg.gradle.workers.max=4 \
            -Dorg.gradle.caching=true

  # Unit tests - runs on every PR
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: |
          ./gradlew testFullDebugUnitTest \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC -Xss1024m" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Dorg.gradle.daemon=true \
            -Dorg.gradle.workers.max=4 \
            -Dorg.gradle.caching=true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/test-results/testFullDebugUnitTest/*.xml'
          retention-days: 14

      - name: Test Report Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: '**/build/test-results/testFullDebugUnitTest/*.xml'
          reporter: java-junit
          fail-on-error: true

  # Code quality - ktlint + detekt (runs in parallel with tests)
  code-quality:
    name: Code Quality (ktlint + detekt)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run ktlint check
        run: |
          ./gradlew ktlintCheck \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC" \
            -Dorg.gradle.daemon=true \
            -Dorg.gradle.caching=true
        continue-on-error: true

      - name: Run detekt static analysis
        run: |
          ./gradlew detekt \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC" \
            -Dorg.gradle.daemon=true \
            -Dorg.gradle.caching=true
        continue-on-error: true

      - name: Upload detekt results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: 'build/reports/detekt/'
          retention-days: 14

  # Android Lint - deeper Android-specific checks
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Android Lint
        run: |
          ./gradlew :app:lintFullDebug \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC -Xss1024m" \
            -Dorg.gradle.daemon=true \
            -Dorg.gradle.caching=true
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: 'app/build/reports/lint-results-fullDebug.html'
          retention-days: 14
